<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bullGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 影 -->
  <ellipse cx="100" cy="165" rx="60" ry="15" fill="rgba(76, 29, 149, 0.3)"/>

  <!-- 体 -->
  <ellipse cx="100" cy="95" rx="50" ry="60" fill="url(#bullGradient)" filter="url(#glow)"/>

  <!-- 首 -->
  <rect x="90" y="45" width="20" height="25" rx="10" fill="url(#bullGradient)" filter="url(#glow)"/>

  <!-- 頭 -->
  <circle cx="100" cy="35" r="18" fill="url(#bullGradient)" filter="url(#glow)"/>

  <!-- 耳1 -->
  <ellipse cx="82" cy="18" rx="7" ry="14" fill="#a855f7" filter="url(#glow)"/>

  <!-- 耳2 -->
  <ellipse cx="118" cy="18" rx="7" ry="14" fill="#a855f7" filter="url(#glow)"/>

  <!-- 目1 -->
  <circle cx="92" cy="32" r="3" fill="#fff"/>
  <circle cx="92" cy="32" r="1.5" fill="#000"/>

  <!-- 目2 -->
  <circle cx="108" cy="32" r="3" fill="#fff"/>
  <circle cx="108" cy="32" r="1.5" fill="#000"/>

  <!-- 鼻 -->
  <ellipse cx="100" cy="42" rx="4" ry="3" fill="#4c1d95"/>

  <!-- 口 -->
  <path d="M 100 42 Q 95 45 92 44" stroke="#4c1d95" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 100 42 Q 105 45 108 44" stroke="#4c1d95" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- 角1 -->
  <path d="M 88 25 Q 75 20 70 10" stroke="#c084fc" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- 角2 -->
  <path d="M 112 25 Q 125 20 130 10" stroke="#c084fc" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- 前足1 -->
  <rect x="80" y="145" width="8" height="35" rx="4" fill="url(#bullGradient)" filter="url(#glow)"/>

  <!-- 前足2 -->
  <rect x="112" y="145" width="8" height="35" rx="4" fill="url(#bullGradient)" filter="url(#glow)"/>

  <!-- 後足1 -->
  <rect x="75" y="150" width="8" height="30" rx="4" fill="#7c3aed" filter="url(#glow)"/>

  <!-- 後足2 -->
  <rect x="117" y="150" width="8" height="30" rx="4" fill="#7c3aed" filter="url(#glow)"/>

  <!-- しっぽ -->
  <path d="M 145 100 Q 160 95 165 75 Q 168 60 162 50" stroke="#c084fc" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- 装飾的なハイライト -->
  <circle cx="85" cy="75" r="8" fill="rgba(255, 255, 255, 0.15)" filter="url(#glow)"/>
</svg>